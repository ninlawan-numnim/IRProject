{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Folder: <span class="text-primary">{{ folder.name }}</span></h2>
            <a href="{{ url_for('my_folders') }}" class="btn btn-secondary">&larr; Back to Folders</a>
        </div>
        <hr>

        {% if recipes %}
            <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
                {% for item in recipes %}
                    <div class="col">
                        <div class="card h-100 shadow-sm">
                            <img src="{{ item.image }}" class="card-img-top" alt="{{ item.name }}" style="height: 200px; object-fit: cover;" loading="lazy">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">{{ item.name | title }}</h5>
                                <p class="card-text text-muted small"><i class="bi bi-clock"></i> Time: {{ item.time }}</p>
                                
                                <form method="POST" action="{{ url_for('update_rating', bookmark_id=item.bookmark_id) }}" class="mt-auto mb-3">
                                    <label class="form-label small fw-bold">My Rating:</label>
                                    <div class="input-group input-group-sm">
                                        <select name="rating" class="form-select">
                                            <option value="0" {% if item.rating == 0 %}selected{% endif %}>Not Rated</option>
                                            <option value="1" {% if item.rating == 1 %}selected{% endif %}>1 Star</option>
                                            <option value="2" {% if item.rating == 2 %}selected{% endif %}>2 Stars</option>
                                            <option value="3" {% if item.rating == 3 %}selected{% endif %}>3 Stars</option>
                                            <option value="4" {% if item.rating == 4 %}selected{% endif %}>4 Stars</option>
                                            <option value="5" {% if item.rating == 5 %}selected{% endif %}>5 Stars</option>
                                        </select>
                                        <button class="btn btn-success" type="submit">Save</button>
                                    </div>
                                </form>

                                <form method="POST" action="{{ url_for('delete_bookmark', bookmark_id=item.bookmark_id) }}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm w-100">Remove from Folder</button>
                                </form>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-warning">ยังไม่มีสูตรอาหารในโฟลเดอร์นี้</div>
        {% endif %}
    </div>
</div>
{% endblock %}
