{% extends 'base.html' %}

{% block content %}
<div class="text-center mt-5">
    <h1 class="display-4">Welcome to Food Bookmarking App</h1>
    <p class="lead">Discover, bookmark, and organize your favorite recipes.</p>
    
    {% if not current_user.is_authenticated %}
        <div class="mt-4">
            <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg me-2">Get Started</a>
            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary btn-lg">Login</a>
        </div>
    {% else %}
        <div class="mt-4">
            <p class="text-muted">Personalized recommendations will appear here.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
